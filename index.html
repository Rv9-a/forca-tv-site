        .live-btn:hover { background: #b30014; transform: translateY(-2px); }
        .yt-section { margin-top: 40px; }
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .yt-item { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,215,0,0.3); transition: 0.3s; }
        .yt-item:hover { border-color: var(--gold); background: rgba(0,0,0,0.6); }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

</head>
<body>

    <div class="header">
        <h1>FORCA TV</h1>
        <div id="status-bar" style="font-size: 0.9rem; margin-top: 5px;">
            <span id="dot" style="height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-left: 5px;"></span>
            <span id="stream-label">جاري التحقق من البث...</span>

    <div class="main-container">
        <div class="video-wrapper">
            <video id="video" controls autoplay playsinline></video>

        <button class="live-btn" onclick="checkAndPlay()">🔄 تحديث / تشغيل الصوت</button>

            <h2 style="border-right: 5px solid var(--gold); padding-right: 15px; text-align: right; margin-bottom: 25px;">آخر التحليلات والأهداف</h2>

                    <div class="iframe-container">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    </div>
                    <h3>تحليل أداء الفريق هذا الأسبوع</h3>
                </div>
                <div class="yt-item">
                    <div class="iframe-container">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    </div>
                    <h3>أخبار سوق الانتقالات الصيفية</h3>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <script async="async" data-cfasync="false" src="https://pl28961754.profitablecpmratenetwork.com/0e2d2bf57e872fb24b14be95d705b754/invoke.js"></script>
            <div id="container-0e2d2bf57e872fb24b14be95d705b754"></div>

    </div>

    <script>
        const video = document.getElementById('video');
        const label = document.getElementById('stream-label');
        const dot = document.getElementById('dot');

        const liveUrl = 'https://live.fcbar.site/LiveApp/streams/reda123.m3u8';
        const r2Backup = 'https://media.fcbar.site/test.mp4';

        function checkAndPlay() {
            // محاولة تشغيل الصوت فور الضغط على الزر (لحل مشكلة حظر المتصفح)
            video.muted = false;
            
            fetch(liveUrl, { method: 'HEAD' })
            .then(res => {
                if (res.ok) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(liveUrl);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play().catch(e => console.log("Autoplay with sound blocked. User interaction needed."));
                            updateStatus(true);
                        });
                    }
                } else { playBackup(); }
            })
            .catch(() => playBackup());
        }

        function playBackup() {
            video.src = r2Backup;
            video.loop = true;
            video.muted = false; // التأكد من أن الصوت مفتوح
            video.play().catch(e => {
                console.log("Audio was muted due to browser policy. Re-muting to allow autoplay.");
                video.muted = true; // إذا رفض المتصفح، سيعمل المقطع صامتاً لضمان عدم توقف الموقع
                video.play();
            });
            updateStatus(false);
        }

        function updateStatus(isLive) {
            if (isLive) {
                label.innerText = "بث حي ومباشر الآن ✅";
                dot.style.backgroundColor = "#00ff00";
            } else {
                label.innerText = "يعرض الآن: أجمل الأهداف (في انتظار المباراة)";
                dot.style.backgroundColor = "#fff";
            }
        }

        // تشغيل أولي
        checkAndPlay();

        // حل ذكي: عند أول نقرة للمستخدم في أي مكان بالموقع، يتم فتح الصوت تلقائياً
        document.body.addEventListener('click', function() {
            if (video.muted) {
                video.muted = false;
                video.play();
            }
        }, { once: true });
    </script>
