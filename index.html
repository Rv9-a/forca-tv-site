<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCA TV | المشغل الذكي</title>
    
    <script src="https://pl28961727.profitablecpmratenetwork.com/c3/3f/16/c33f165bbfa5fe7f26e4b260d5b6a6ed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --barca-blue: #004d98; --barca-red: #a50044; --gold: #edbb00; }
        body { background-color: var(--barca-blue); color: white; text-align: center; margin: 0; font-family: sans-serif; }
        .header { background: var(--barca-red); padding: 15px; border-bottom: 4px solid var(--gold); }
        .main-container { width: 95%; max-width: 1000px; margin: 15px auto; padding-bottom: 50px; }
        
        /* المشغل الرئيسي الموحد */
        .video-wrapper { background: #000; border: 3px solid var(--gold); border-radius: 15px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); aspect-ratio: 16/9; }
        #main-video, #main-iframe { width: 100%; height: 100%; border: none; display: none; }
        #main-video.active, #main-iframe.active { display: block; }

        .yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .item-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,215,0,0.3); cursor: pointer; transition: 0.3s; }
        .item-box:hover { border-color: var(--gold); transform: translateY(-5px); }
        .thumb-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #222; }
        .thumb-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .thumb-container .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; color: white; opacity: 0.8; }
        
        .status-tag { background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FORCA TV</h1>
        <small id="current-title" style="color:var(--gold); font-weight:bold;">البث المباشر ⚽</small>
    </div>

    <div class="main-container">
        <div class="video-wrapper" id="player-container">
            <video id="main-video" class="active" controls autoplay muted playsinline></video>
            <iframe id="main-iframe" allowfullscreen allow="autoplay"></iframe>
        </div>

        <div class="yt-grid">
            <div class="item-box" id="live-card" onclick="switchToLive()">
                <div class="thumb-container">
                    <img src="https://media.fcbar.site/thumb1.jpg" alt="Live"> <span class="status-tag">بث مباشر</span>
                    <span class="play-overlay">▶</span>
                </div>
                <h3 style="font-size: 0.9rem;">الرجوع للبث المباشر / الإعلانات</h3>
            </div>

            <div class="item-box" onclick="switchToYT('dQw4w9WgXcQ', 'تحليل فوز البرسا الأخير')">
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg" alt="YT">
                    <span class="play-overlay">▶</span>
                </div>
                <h3 style="font-size: 0.9rem;">تحليل فوز البرسا الأخير</h3>
            </div>

            <div class="item-box" onclick="switchToYT('dQw4w9WgXcQ', 'أهداف الأسبوع')">
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg" alt="YT">
                    <span class="play-overlay">▶</span>
                </div>
                <h3 style="font-size: 0.9rem;">أهداف الأسبوع</h3>
            </div>
        </div>

        <div style="margin-top:30px;">
            <script type="text/javascript">
                atOptions = {'key' : '6885d0e957b9c4c7a142c9e23f6f6850','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/6885d0e957b9c4c7a142c9e23f6f6850/invoke.js"></script>
        </div>
    </div>

    <script>
        const videoPlayer = document.getElementById('main-video');
        const iframePlayer = document.getElementById('main-iframe');
        const currentTitle = document.getElementById('current-title');
        
        const liveUrl = 'https://live.fcbar.site/LiveApp/streams/reda123.m3u8';
        const r2Backup = 'https://media.fcbar.site/test.mp4';
        let hls = null;

        // وظيفة تشغيل البث المباشر أو الـ R2
        function switchToLive() {
            iframePlayer.classList.remove('active');
            iframePlayer.src = "";
            videoPlayer.classList.add('active');
            currentTitle.innerText = "البث المباشر ⚽";
            
            fetch(liveUrl, { method: 'HEAD' })
            .then(res => {
                if (res.ok) {
                    if (Hls.isSupported()) {
                        if(hls) hls.destroy();
                        hls = new Hls();
                        hls.loadSource(liveUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                    }
                } else {
                    videoPlayer.src = r2Backup;
                    videoPlayer.loop = true;
                    videoPlayer.play();
                }
            }).catch(() => {
                videoPlayer.src = r2Backup;
                videoPlayer.loop = true;
                videoPlayer.play();
            });
        }

        // وظيفة التحويل لليوتيوب
        function switchToYT(videoID, title) {
            videoPlayer.pause();
            videoPlayer.classList.remove('active');
            
            iframePlayer.classList.add('active');
            iframePlayer.src = `https://www.youtube.com/embed/${videoID}?autoplay=1`;
            currentTitle.innerText = "يعرض الآن: " + title;
        }

        // تشغيل أولي (البث المباشر)
        switchToLive();

        // فتح الصوت عند أول ضغطة
        document.addEventListener('click', () => {
            videoPlayer.muted = false;
        }, { once: true });
    </script>

    <script src="https://pl28961738.profitablecpmratenetwork.com/c0/f1/3f/c0f13f0e3752bc91ec64e84a0bc6eb05.js"></script>
</body>
</html>
