<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCA TV | منصة المشجعين</title>
    
    <script src="https://pl28961727.profitablecpmratenetwork.com/c3/3f/16/c33f165bbfa5fe7f26e4b260d5b6a6ed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --barca-blue: #004d98; --barca-red: #a50044; --gold: #edbb00; }
        body { background-color: var(--barca-blue); color: white; text-align: center; margin: 0; font-family: sans-serif; }
        .header { background: var(--barca-red); padding: 15px; border-bottom: 4px solid var(--gold); }
        .main-container { width: 95%; max-width: 1000px; margin: 15px auto; padding-bottom: 50px; }
        .video-wrapper { background: #000; border: 3px solid var(--gold); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .live-btn { background: #e2001a; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 15px 0; transition: 0.3s; }
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .yt-item { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,215,0,0.3); }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FORCA TV</h1>
        <div id="status-bar" style="font-size: 0.9rem; margin-top: 5px;">
            <span id="dot" style="height: 10px; width: 10px; background-color: #fff; border-radius: 50%; display: inline-block;"></span>
            <span id="stream-label">جاري الفحص...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="video-wrapper">
            <video id="video" controls autoplay muted playsinline></video>
        </div>

        <button class="live-btn" onclick="unmuteVideo()">🔊 تفعيل الصوت / تحديث</button>

        <div class="yt-grid">
            <div class="yt-item">
                <div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
                <h3 style="color:var(--gold)">ملخص المباراة</h3>
            </div>
            <div class="yt-item">
                <div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
                <h3 style="color:var(--gold)">تحليل الأداء</h3>
            </div>
            <div class="yt-item">
                <div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
                <h3 style="color:var(--gold)">أخبار الفريق</h3>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const label = document.getElementById('stream-label');
        const liveUrl = 'https://live.fcbar.site/LiveApp/streams/reda123.m3u8';
        const r2Backup = 'https://media.fcbar.site/test.mp4';

        function checkAndPlay() {
            fetch(liveUrl, { method: 'HEAD' })
            .then(res => {
                if (res.ok) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(liveUrl);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            label.innerText = "بث حي ومباشر الآن ✅";
                        });
                    }
                } else { playBackup(); }
            })
            .catch(() => playBackup());
        }

        function playBackup() {
            video.src = r2Backup;
            video.loop = true;
            video.play();
            label.innerText = "يعرض الآن: أجمل الأهداف";
        }

        // دالة فتح الصوت يدوياً وبرمجياً
        function unmuteVideo() {
            video.muted = false;
            checkAndPlay(); // إعادة فحص البث وتحديث المشغل
        }

        // الخدعة: أول لمسة للشاشة في أي مكان تفتح الصوت تلقائياً
        document.addEventListener('click', () => {
            video.muted = false;
        }, { once: true });

        checkAndPlay();
    </script>

    <script src="https://pl28961738.profitablecpmratenetwork.com/c0/f1/3f/c0f13f0e3752bc91ec64e84a0bc6eb05.js"></script>
</body>
</html>
