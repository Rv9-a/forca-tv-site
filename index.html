<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCA TV | Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --barca-blue: #004d98; 
            --barca-red: #a50044; 
            --gold: #edbb00; 
            --dark-bg: #0a0a0a; 
            --card-bg: #1a1a1a;
        }
        
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            line-height: 1.6;
        }

        .header { 
            background: linear-gradient(90deg, var(--barca-blue), var(--barca-red)); 
            padding: 15px 20px; 
            border-bottom: 3px solid var(--gold); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-logo {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .main-container { 
            width: 95%; 
            max-width: 1000px; 
            margin: 20px auto; 
            padding-bottom: 60px; 
        }

        .video-wrapper { 
            background: #000; 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            overflow: hidden; 
            aspect-ratio: 16/9; 
            position: relative; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #main-video, #main-iframe { width: 100%; height: 100%; border: none; display: none; }
        #main-video.active, #main-iframe.active { display: block; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .action-btn { 
            border: none; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            transition: 0.3s; 
            font-size: 1rem;
        }
        .btn-unmute { background: #28a745; }
        .btn-live { background: #e2001a; }
        .action-btn:hover { transform: scale(1.05); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 35px; }
        .data-card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 20px; 
            border: 1px solid #333; 
        }
        .section-title { 
            border-right: 4px solid var(--gold); 
            padding-right: 12px; 
            margin-bottom: 20px; 
            color: var(--gold); 
            text-align: right; 
            font-weight: bold; 
            font-size: 1.2rem;
        }
        
        .match-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #2a2a2a; 
        }
        .match-item:last-child { border-bottom: none; }
        
        .score-box { 
            background: #333; 
            padding: 5px 15px; 
            border-radius: 8px; 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 1.1rem;
        }

        .team-name { font-size: 0.95rem; font-weight: 500; width: 35%; }
        .match-info-vertical { text-align: center; width: 100%; }
        .match-time { font-size: 0.8rem; color: #888; margin-top: 4px; }

        .yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 45px; }
        .item-box { background: var(--card-bg); border-radius: 15px; padding: 12px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .item-box:hover { border-color: var(--gold); transform: translateY(-8px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; position: relative; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-container::after { 
            content: "▶"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 30px; color: white; background: rgba(0,0,0,0.4); border-radius: 50%; width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; padding-left: 5px;
        }
        h3 { font-size: 0.9rem; margin: 12px 0 5px 0; text-align: right; color: #eee; line-height: 1.5; }

        @media (max-width: 768px) { .data-grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Logo" class="header-logo">
        <h1>FORCA TV</h1>
    </div>

    <div class="main-container">
        <div class="video-section">
            <div class="video-wrapper">
                <video id="main-video" class="active" controls autoplay muted playsinline></video>
                <iframe id="main-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="btn-group">
                <button class="action-btn btn-unmute" onclick="unmuteOnly()">🔊 فتح الصوت</button>
                <button class="action-btn btn-live" onclick="switchToLive()">🔴 البث المباشر</button>
            </div>
        </div>

        <div class="data-grid">
            <div class="data-card">
                <div class="section-title">المباريات المنتهية</div>
                <div id="past-matches-list"></div>
            </div>
            <div class="data-card">
                <div class="section-title">المباريات القادمة</div>
                <div id="upcoming-matches-list"></div>
            </div>
        </div>

        <h2 style="text-align: right; border-right: 5px solid var(--gold); padding-right: 15px; margin-top: 50px;">أحدث التحليلات</h2>
        <div id="youtube-list" class="yt-grid"></div>
    </div>

    <script>
        /******************************************************************
         * 🟢 لوحة التحكم (البيانات التي أرسلتها أنت) 🟢
         ******************************************************************/

        const CONFIG = {
            liveUrl: "https://live.fcbar.site/LiveApp/streams/reda123.m3u8",
            backupVideo: "https://media.fcbar.site/test.mp4"
        };

        const PAST_MATCHES = [
            { home: "برشلونة", away: "رايو فاليكانو", score: "1 - 0" },
            { home: "برشلونة", away: "نيوكاسل", score: "7 - 2" },
            { home: "اشبيلية", away: "برشلونة", score: "2 - 5" }
        ];

        const UPCOMING_MATCHES = [
            { home: "برشلونة", away: "اتلتكو مدريد", date: "4 ابريل", time: "10:00 مساءً" },
            { home: "اتلتكو مدريد", away: "برشلونة", date: "8 ابريل", time: "10:00 مساءً" },
            { home: "اسبانيول", away: "برشلونة", date: "11 ابريل", time: "7:30 مساءً" }
        ];

        const YOUTUBE_LIST = [
            { id: "UENAl15P36k", title: "برشلونة 1-0 رايو فايكانو - أسباب سوء الأداء | الكوتش" },
            { id: "zAa2b0NLUgY", title: "هل سيميوني طعن هانز فليك في ديربي مدريد؟" },
            { id: "6T7N_ikApZ4", title: "فوز برشلونة وتألق جوان غارسيا للصدارة" }
        ];

        /******************************************************************
         * 🛠️ المنطق البرمجي 🛠️
         ******************************************************************/

        const videoPlayer = document.getElementById('main-video');
        const iframePlayer = document.getElementById('main-iframe');
        let hlsPlayer = null;

        function unmuteOnly() { videoPlayer.muted = false; }

        function switchToLive() {
            iframePlayer.classList.remove('active');
            iframePlayer.src = "";
            videoPlayer.classList.add('active');
            if (Hls.isSupported()) {
                if(hlsPlayer) hlsPlayer.destroy();
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(CONFIG.liveUrl);
                hlsPlayer.attachMedia(videoPlayer);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
            } else {
                videoPlayer.src = CONFIG.liveUrl;
                videoPlayer.play();
            }
        }

        function playYouTube(id) {
            if(hlsPlayer) hlsPlayer.stopLoad();
            videoPlayer.pause();
            videoPlayer.classList.remove('active');
            iframePlayer.classList.add('active');
            iframePlayer.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initApp() {
            let pastHtml = "";
            PAST_MATCHES.forEach(m => {
                pastHtml += `<div class="match-item"><span class="team-name">${m.home}</span><div class="score-box">${m.score}</div><span class="team-name" style="text-align:left">${m.away}</span></div>`;
            });
            document.getElementById('past-matches-list').innerHTML = pastHtml;

            let upcomingHtml = "";
            UPCOMING_MATCHES.forEach(m => {
                upcomingHtml += `<div class="match-item"><div class="match-info-vertical"><div style="font-weight:bold;">${m.home} <span style="color:var(--gold)">VS</span> ${m.away}</div><div class="match-time">${m.date} • ${m.time}</div></div></div>`;
            });
            document.getElementById('upcoming-matches-list').innerHTML = upcomingHtml;

            let ytHtml = "";
            YOUTUBE_LIST.forEach(v => {
                ytHtml += `<div class="item-box" onclick="playYouTube('${v.id}')"><div class="thumb-container"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"></div><h3>${v.title}</h3></div>`;
            });
            document.getElementById('youtube-list').innerHTML = ytHtml;
            switchToLive();
        }

        window.onload = initApp;
        document.addEventListener('click', () => { if (videoPlayer.classList.contains('active')) videoPlayer.muted = false; }, { once: true });
    </script>
</body>
</html>
