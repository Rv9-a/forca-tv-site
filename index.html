<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCA TV | Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { 
            --barca-blue: #004d98; 
            --barca-red: #a50044; 
            --gold: #edbb00; 
            --dark-bg: #0a0a0a; 
            --card-bg: #1a1a1a; 
        }
        
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            line-height: 1.6; 
        }

        .header { 
            background: linear-gradient(90deg, var(--barca-blue), var(--barca-red)); 
            padding: 10px 20px; 
            border-bottom: 3px solid var(--gold); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-logo { 
            height: 70px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.4));
        }

        .header h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .main-container { 
            width: 95%; 
            max-width: 1000px; 
            margin: 20px auto; 
            padding-bottom: 60px; 
        }

        .video-wrapper { 
            background: #000; 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            overflow: hidden; 
            aspect-ratio: 16/9; 
            position: relative; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        #main-video, #main-iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: none; 
            background: #000; 
        }

        #main-video.active, #main-iframe.active { 
            display: block; 
        }

        .btn-group { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin: 25px 0; 
            flex-wrap: wrap;
        }

        .action-btn { 
            border: none; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 1rem;
        }

        .btn-unmute { background: #28a745; }
        .btn-live { background: #e2001a; }
        .action-btn:hover { transform: scale(1.05); }

        .data-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 35px; 
        }

        .data-card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 20px; 
            border: 1px solid #333; 
        }

        .section-title { 
            border-right: 4px solid var(--gold); 
            padding-right: 12px; 
            margin-bottom: 20px; 
            color: var(--gold); 
            text-align: right; 
            font-weight: bold; 
            font-size: 1.2rem;
        }

        .match-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #2a2a2a; 
        }

        .score-box { 
            background: #333; 
            padding: 5px 12px; 
            border-radius: 8px; 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 1.1rem;
        }

        .team-name { font-size: 0.9rem; width: 35%; }

        .yt-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 40px; 
        }

        .item-box { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 10px; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .item-box:hover { 
            border-color: var(--gold); 
            transform: translateY(-5px); 
        }

        .thumb-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            border-radius: 10px; 
            overflow: hidden; 
            position: relative;
        }

        .thumb-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        @media (max-width: 768px) { 
            .data-grid { grid-template-columns: 1fr; } 
            .header h1 { font-size: 1.6rem; }
            .header-logo { height: 50px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="FORCA TV" class="header-logo" onerror="this.style.display='none'">
        <h1>FORCA TV</h1>
    </div>

    <div class="main-container">
        <div class="video-section">
            <div class="video-wrapper">
                <video id="main-video" class="active" controls autoplay muted playsinline></video>
                <iframe id="main-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="btn-group">
                <button class="action-btn btn-unmute" onclick="unmuteVideo()">🔊 فتح الصوت</button>
                <button class="action-btn btn-live" onclick="switchToLive()">🔴 البث المباشر</button>
            </div>
        </div>

        <div class="data-grid">
            <div class="data-card">
                <div class="section-title">المباريات المنتهية</div>
                <div id="past-matches-list"></div>
            </div>
            <div class="data-card">
                <div class="section-title">المباريات القادمة</div>
                <div id="upcoming-matches-list"></div>
            </div>
        </div>

        <h2 style="text-align: right; border-right: 5px solid var(--gold); padding-right: 15px; margin-top: 50px;">أحدث التحليلات</h2>
        <div id="youtube-list" class="yt-grid"></div>
    </div>

    <script>
        const CONFIG = {
            // استخدام HTTPS لضمان التوافق مع المتصفحات الحديثة
            liveUrl: "https://stream.fcbar.site/LiveApp/streams/server1.m3u8", 
            backupVideo: "https://media.fcbar.site/test.mp4"
        };

        const PAST_MATCHES = [
            { home: "برشلونة", away: "رايو فاليكانو", score: "1 - 0" },
            { home: "برشلونة", away: "نيوكاسل", score: "7 - 2" },
            { home: "اشبيلية", away: "برشلونة", score: "2 - 5" }
        ];

        const UPCOMING_MATCHES = [
            { home: "برشلونة", away: "اتلتكو مدريد", date: "4 ابريل", time: "10:00 مساءً" },
            { home: "اتلتكو مدريد", away: "برشلونة", date: "8 ابريل", time: "10:00 مساءً" },
            { home: "اسبانيول", away: "برشلونة", date: "11 ابريل", time: "7:30 مساءً" }
        ];

        const YOUTUBE_LIST = [
            { id: "UENAl15P36k", title: "برشلونة 1-0 رايو فايكانو - أسباب سوء الأداء | الكوتش" },
            { id: "zAa2b0NLUgY", title: "هل سيميوني طعن هانز فليك في ديربي مدريد؟" },
            { id: "6T7N_ikApZ4", title: "فوز برشلونة وتألق جوان غارسيا للصدارة" }
        ];

        const video = document.getElementById('main-video');
        const iframe = document.getElementById('main-iframe');
        let hls = null;

        function unmuteVideo() { 
            video.muted = false; 
        }

        // دالة مخصصة لتشغيل فيديو الإعلان عند انقطاع البث
        function playBackup() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.src = CONFIG.backupVideo;
            video.loop = true;
            video.play().catch(e => console.log("خطأ في تشغيل الإعلان"));
        }

        function switchToLive() {
            iframe.style.display = 'none';
            iframe.src = "";
            video.style.display = 'block';
            video.classList.add('active');

            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    // تقليل المحاولات لسرعة التحويل للإعلان عند الفشل
                    manifestLoadingMaxRetry: 1,
                    levelLoadingMaxRetry: 1,
                    enableWorker: true
                });
                
                hls.loadSource(CONFIG.liveUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.muted = true; 
                    video.play().catch(e => console.log("بانتظار تفاعل المستخدم"));
                });

                // معالجة الخطأ: إذا لم يجد ملف البث، يحول للإعلان
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.log("انقطع البث.. جاري تشغيل مقطع الإعلان");
                        playBackup();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // دعم أجهزة آيفون
                video.src = CONFIG.liveUrl;
                video.play();
                video.onerror = function() {
                    playBackup();
                };
            }
        }

        function playYouTube(id) {
            if (hls) {
                hls.stopLoad();
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.style.display = 'none';
            iframe.style.display = 'block';
            iframe.classList.add('active');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function init() {
            document.getElementById('past-matches-list').innerHTML = PAST_MATCHES.map(m => `
                <div class="match-item">
                    <span class="team-name">${m.home}</span>
                    <div class="score-box">${m.score}</div>
                    <span class="team-name" style="text-align:left">${m.away}</span>
                </div>
            `).join('');

            document.getElementById('upcoming-matches-list').innerHTML = UPCOMING_MATCHES.map(m => `
                <div class="match-item">
                    <div style="text-align:center;width:100%">
                        <b>${m.home} <span style="color:var(--gold)">VS</span> ${m.away}</b><br>
                        <small style="color:#888">${m.date} • ${m.time}</small>
                    </div>
                </div>
            `).join('');

            document.getElementById('youtube-list').innerHTML = YOUTUBE_LIST.map(v => `
                <div class="item-box" onclick="playYouTube('${v.id}')">
                    <div class="thumb-container">
                        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                    </div>
                    <h3 style="font-size:1rem; padding: 5px;">${v.title}</h3>
                </div>
            `).join('');

            switchToLive();
        }

        window.onload = init;
    </script>
</body>
</html>
