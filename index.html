<body>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        const streamLabel = document.getElementById('stream-label');

        // --- إعدادات الروابط ---
        const liveUrl = 'https://live.fcbar.site/LiveApp/streams/reda123.m3u8';
        const r2Url = 'https://media.fcbar.site/test.mp4'; // رابط المقطع الذي جربناه في R2

        function checkAndPlay() {
            // محاولة جلب ملف البث المباشر (M3U8) لفحص وجوده
            fetch(liveUrl, { method: 'HEAD' })
            .then(response => {
                if (response.ok) {
                    playLive();
                } else {
                    playR2();
                }
            })
            .catch(() => {
                playR2(); // في حال فشل الاتصال تماماً (السيرفر طافي)
            });
        }

        function playLive() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(liveUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    statusText.innerText = "البث المباشر يعمل الآن ✅";
                    statusText.style.color = "#00ff00";
                    streamLabel.innerText = "بث حي ومباشر ⚽";
                });
            }
        }

        function playR2() {
            video.src = r2Url;
            video.loop = true; // نجعله يتكرر حالياً حتى نضيف السلسلة لاحقاً
            video.play();
            statusText.innerText = "انتظرونا في المباراة القادمة!";
            streamLabel.innerText = "يعرض الآن: أجمل الأهداف";
        }

        // ابدأ العملية
        checkAndPlay();
    </script>
