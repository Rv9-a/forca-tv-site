<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORCA TV | المشغل الذكي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --barca-blue: #004d98; --barca-red: #a50044; --gold: #edbb00; }
        body { background-color: var(--barca-blue); color: white; text-align: center; margin: 0; font-family: sans-serif; }
        .header { background: var(--barca-red); padding: 15px; border-bottom: 4px solid var(--gold); }
        .main-container { width: 95%; max-width: 1000px; margin: 15px auto; padding-bottom: 50px; }
        
        /* المشغل الرئيسي */
        .video-wrapper { background: #000; border: 3px solid var(--gold); border-radius: 15px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); aspect-ratio: 16/9; }
        #main-video, #main-iframe { width: 100%; height: 100%; border: none; display: none; }
        #main-video.active, #main-iframe.active { display: block; }

        /* زر التحديث وتفعيل الصوت */
        .action-btn { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 20px 0; transition: 0.3s; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .action-btn:hover { background: #218838; transform: scale(1.05); }

        /* شبكة المقاطع (4 أعمدة) */
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 30px; }
        .item-box { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 8px; border: 1px solid rgba(255,215,0,0.2); cursor: pointer; transition: 0.3s; }
        .item-box:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(0,0,0,0.6); }
        .thumb-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #222; }
        .thumb-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .thumb-container .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 35px; color: white; opacity: 0.8; }
        
        .status-tag { background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; position: absolute; top: 8px; right: 8px; font-weight: bold; }
        h3 { font-size: 0.85rem; margin: 10px 0 5px 0; color: #fff; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FORCA TV</h1>
        <small id="current-title" style="color:var(--gold); font-weight:bold;">البث المباشر ⚽</small>
    </div>

    <div class="main-container">
        <div class="video-wrapper" id="player-container">
            <video id="main-video" class="active" controls autoplay muted playsinline></video>
            <iframe id="main-iframe" allowfullscreen allow="autoplay"></iframe>
        </div>

        <button class="action-btn" onclick="refreshAndUnmute()">🔄 تحديث البث / تفعيل الصوت</button>

        <h2 style="text-align: right; border-right: 4px solid var(--gold); padding-right: 10px; margin-top: 40px; font-size: 1.2rem;">قائمة العرض</h2>
        
        <div class="yt-grid">
            <div class="item-box" onclick="switchToLive()">
                <div class="thumb-container">
                    <img src="https://media.fcbar.site/thumb1.jpg" alt="Live"> 
                    <span class="status-tag">LIVE</span>
                    <span class="play-overlay">▶</span>
                </div>
                <h3>الرجوع للبث المباشر</h3>
            </div>

            <div class="item-box" onclick="switchToYT('dQw4w9WgXcQ', 'تحليل المباراة الأولى')">
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg" alt="YT">
                    <span class="play-overlay">▶</span>
                </div>
                <h3>تحليل المباراة الأولى</h3>
            </div>

            <div class="item-box" onclick="switchToYT('dQw4w9WgXcQ', 'ملخص الأهداف')">
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg" alt="YT">
                    <span class="play-overlay">▶</span>
                </div>
                <h3>ملخص الأهداف الحماسية</h3>
            </div>

            <div class="item-box" onclick="switchToYT('dQw4w9WgXcQ', 'أخبار الانتقالات')">
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg" alt="YT">
                    <span class="play-overlay">▶</span>
                </div>
                <h3>آخر أخبار الانتقالات</h3>
            </div>
        </div>
    </div>

    <script>
        const videoPlayer = document.getElementById('main-video');
        const iframePlayer = document.getElementById('main-iframe');
        const currentTitle = document.getElementById('current-title');
        
        const liveUrl = 'https://live.fcbar.site/LiveApp/streams/reda123.m3u8';
        const r2Backup = 'https://media.fcbar.site/test.mp4';
        let hls = null;

        function refreshAndUnmute() {
            videoPlayer.muted = false;
            switchToLive();
        }

        function switchToLive() {
            iframePlayer.classList.remove('active');
            iframePlayer.src = "";
            videoPlayer.classList.add('active');
            currentTitle.innerText = "البث المباشر ⚽";
            
            fetch(liveUrl, { method: 'HEAD' })
            .then(res => {
                if (res.ok) {
                    if (Hls.isSupported()) {
                        if(hls) hls.destroy();
                        hls = new Hls();
                        hls.loadSource(liveUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                    }
                } else {
                    videoPlayer.src = r2Backup;
                    videoPlayer.loop = true;
                    videoPlayer.play();
                }
            }).catch(() => {
                videoPlayer.src = r2Backup;
                videoPlayer.loop = true;
                videoPlayer.play();
            });
        }

        function switchToYT(videoID, title) {
            videoPlayer.pause();
            videoPlayer.classList.remove('active');
            
            iframePlayer.classList.add('active');
            iframePlayer.src = `https://www.youtube.com/embed/${videoID}?autoplay=1`;
            currentTitle.innerText = "يعرض الآن: " + title;
        }

        // تشغيل أولي
        switchToLive();

        // تفعيل الصوت عند أول تفاعل
        document.addEventListener('click', () => {
            if (videoPlayer.classList.contains('active')) {
                videoPlayer.muted = false;
            }
        }, { once: true });
    </script>
</body>
</html>
